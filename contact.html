<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>村瀬元旗 | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="contact">
    <div class="noise" aria-hidden="true"></div>
    <div class="frame">
      <header class="topbar">
        <a class="brand" href="./index.html">MURASE GENKI</a>
        <nav class="nav">
          <a href="./index.html">Home</a>
          <a href="./about.html">About</a>
          <a href="./works.html">Works</a>
          <a href="./contact.html">Contact</a>
        </nav>
      </header>

      <main>
        <section class="page-hero panel">
          <div>
            <p class="eyebrow">CONTACT / LINKS</p>
            <h1>
              Contact
              <span>仮の連絡先は削除し、公開情報のない項目は掲載していません。</span>
            </h1>
            <p class="page-lead">
              このページでは、ダミーのメールアドレスやSNSリンクを置かない構成に変更しています。
            </p>
          </div>
          <div class="hero-meta">
            <div class="meta-card">
              <span class="meta-label">STATUS</span>
              <strong>連絡先は現在未掲載</strong>
              <span>公開可能な情報のみ反映</span>
            </div>
          </div>
        </section>

        <section class="page-section panel">
          <div class="page-section-head">
            <p class="eyebrow">01 / STATUS</p>
            <h2>公開情報</h2>
          </div>
          <article class="contact-card">
            <span class="meta-label">NOTICE</span>
            <h3>ダミー情報は削除済みです</h3>
            <p>メールアドレス、SNS、外部連絡先は、実データが確定してから追加できる状態にしています。</p>
          </article>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
